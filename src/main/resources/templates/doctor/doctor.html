<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubic Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/CSS/panel.css}">

</head>
<body>          
    <!-- Sidebar -->    
    <div class="sidebar" id="sidebar">
        <div class="logo">
            <div>
                <h1>PANEL</h1>
                <h1>DOCENTE</h1>
            </div>
            <button class="toggle-btn" id="toggleBtn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        
        <ul class="menu">

            <li onclick="loadPage('/doctor/prestamo/prestamo-vista', 'Historial Clinico', 'pretamoFrame', this)">
                <i class="fas fa-file-export"></i>
                <span class="menu-text">Entrega Archivos</span>
            </li>

            <li onclick="loadPage('/doctor/historial_clinico/historial_clinico_ENPROCESO', 'Historial Clinico', 'historiaClinicaFrame', this)">
                <i class="fas fa-notes-medical"></i>
                <span class="menu-text">Buscar Historial Clinico</span>
            </li>
            <li onclick="loadPage('/doctor/estado_consentimiento/estadoConsentimiento', 'Consentimiento', 'ConsentimientoEstadoFrame', this)">
                <i class="fas fa-file-signature"></i>
                <span class="menu-text">Consentimiento</span>

            </li>
            <li onclick="loadPage('/doctor/solicitud-estudiante/solicitud_det-vista', 'Solicitud Estudiante', 'solicitudEstudianteFrame', this)">
                <i class="fas fa-user-graduate"></i>
                <span class="menu-text">Solicitud Estudiante</span>
            </li>
            <li onclick="loadPage('/doctor/desbloqueoEstudiante/desbloqueo', 'Desbloqueo Estudiante', 'desbloqueoFrame', this)">
                <i class="fas fa-unlock-alt"></i>
                <span class="menu-text">Desbloqueo Estudiante</span>
            </li>
            <li onclick="loadPage('/doctor/Registro-Estudiante/estudiante-vista', 'Registro Estudiante', 'registroEstudianteFrame', this)">
                <i class="fas fa-table"></i>
                <span class="menu-text">Registro Estudiante</span>
            </li>

            <li onclick="loadPage('/doctor/Archivo/archivo-vista', ' Archivos', 'ArchivosFrame', this)">
                <i class="fas fa-folder-open"></i>
                <span class="menu-text">Buscar Archivos</span>
            </li>
            <li onclick="loadPage('/doctor/cupo-estudiante/cupo-vista', 'Cupo Estudiante', 'cupoFrame', this)">
                <i class="fas fa-users"></i>
                <span class="menu-text">Cupo Estudiante</span>
            </li>
        </ul>
        
        <div class="user-info">
            <div class="user-avatar">HG</div>
            <div class="user-details">
                <div class="user-name">Hanna Gover</div>
            </div>
        </div>
    </div>
    
    <div class="main-content" id="mainContent">

        <div id="prestamoFrame" class="content-area">
            <iframe id="pretamoFrame" src="about:blank"></iframe>
        </div>


        <!-- Contenido de Nuevo Paciente -->
        <div id="nuevoPacienteContent" class="content-area">
            <iframe id="historiaClinicaFrame" src="about:blank"></iframe>
        </div>
        
        <!-- Contenido de Consentimiento -->
        <div id="ConsentimientoEstadoContent" class="content-area">
            <iframe id="ConsentimientoEstadoFrame" src="about:blank"></iframe>
        </div>


        <!-- Contenido de Solicitud Estudiante -->
        <div id="solicitudEstudianteContent" class="content-area">
            <iframe id="solicitudEstudianteFrame" src="about:blank"></iframe>
        </div>

        <!-- Contenido de Desbloqueo Estudiante -->
        <div id="desbloqueoContent" class="content-area">
            <iframe id="desbloqueoFrame" src="about:blank"></iframe>
        </div>

        <!-- Contenido de Registro Estudiante -->
        <div id="registroEstudianteContent" class="content-area">
            <iframe id="registroEstudianteFrame" src="about:blank"></iframe>
        </div>

            <!-- Contenido de Archivos -->
            <div id="ArchivosContent" class="content-area">
                <iframe id="ArchivosFrame" src="about:blank"></iframe>
            </div>

                <!-- Contenido de Cupo Estudiante -->
        <div id="cupoContent" class="content-area">
            <iframe id="cupoFrame" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        // Toggle sidebar
        const toggleBtn = document.getElementById('toggleBtn');
        const sidebar = document.getElementById('sidebar');
        
        toggleBtn.addEventListener('click', function() {
            sidebar.classList.toggle('collapsed');
        });

        function loadPage(pageUrl, pageTitle, frameId, menuItem) {
            console.log('Cargando:', pageUrl, 'en iframe:', frameId);
            
            // 1. Ocultar todos los contenidos
            document.querySelectorAll('.content-area').forEach(content => {
                content.classList.remove('active');
            });
            
            // 2. Desactivar todos los items del menú
            document.querySelectorAll('.menu li').forEach(item => {
                item.classList.remove('active');
            });
            
            // 3. Activar el item del menú clickeado
            if (menuItem) {
                menuItem.classList.add('active');
            }
            
            // 4. Determinar qué contenedor activar según el frameId
            let contentId = '';
            if (frameId === 'historiaClinicaFrame') {
                contentId = 'nuevoPacienteContent';
            }else if (frameId === 'pretamoFrame') {
                contentId = 'prestamoFrame';
            }
            
            else if (frameId === 'ConsentimientoEstadoFrame') {
                contentId = 'ConsentimientoEstadoContent';
            } else if (frameId === 'desbloqueoFrame') {
                contentId = 'desbloqueoContent';
            } else if (frameId === 'registroEstudianteFrame') {
                contentId = 'registroEstudianteContent';
            } else if (frameId === 'ArchivosFrame') {
                contentId = 'ArchivosContent';
            } else if (frameId === 'solicitudEstudianteFrame') {
                contentId = 'solicitudEstudianteContent';
            } else if (frameId === 'cupoFrame') {
                contentId = 'cupoContent';
            }
            
            if (contentId) {
                document.getElementById(contentId).classList.add('active');
            } else {
                console.error('No se encontró contentId para frameId:', frameId);
                return;
            }
            
            // 5. Cargar la URL en el iframe
            const frame = document.getElementById(frameId);
            if (frame) {
                frame.src = pageUrl;
            } else {
                console.error('Iframe no encontrado:', frameId);
            }
            
            // 6. Opcional: actualizar título de la página si tienes un elemento para ello
            // document.getElementById('pageTitle').textContent = pageTitle;
        }

        // Cargar una página por defecto al iniciar (opcional)
        window.onload = function() {
            // Simular clic en el primer elemento del menú
            const firstMenuItem = document.querySelector('.menu li');
            if (firstMenuItem) {
                firstMenuItem.click();
            }
        };
    </script>
</body>
</html>
