<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Recibos - Clínica Odontológica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 25px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        h1 {
            color: #0D47A1;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .filters-section {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #2196F3;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary {
            background: #2196F3;
            color: white;
        }
        .btn-primary:hover {
            background: #0D47A1;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(33, 150, 243, 0.3);
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }
        .btn-success:hover {
            background: #388E3C;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }

        .btn-secondary {
            background: #999;
            color: white;
        }
        .btn-secondary:hover {
            background: #777;
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #2196F3;
            color: #2196F3;
        }
        .btn-outline:hover {
            background: #2196F3;
            color: white;
        }

        .resumen {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            padding: 15px;
            background: linear-gradient(135deg, #f8f9fa, #e3f2fd);
            border-radius: 8px;
        }

        .resumen-item {
            text-align: center;
        }

        .resumen-item .numero {
            font-size: 24px;
            font-weight: 700;
        }

        .resumen-item .label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .resumen-item .numero.total {
            color: #0D47A1;
        }
        .resumen-item .numero.pendiente {
            color: #e65100;
        }
        .resumen-item .numero.pagado {
            color: #2e7d32;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .recibos-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .recibos-table th,
        .recibos-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .recibos-table th {
            background-color: #f8f9fa;
            color: #0D47A1;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .recibos-table tr:hover {
            background-color: #f5f9ff;
        }

        .recibos-table .estado-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .estado-pendiente {
            background: #fff3e0;
            color: #e65100;
        }

        .estado-parcial {
            background: #e3f2fd;
            color: #0D47A1;
        }

        .estado-pagado {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .text-monto {
            font-weight: 600;
        }
        .text-verde {
            color: #2e7d32;
        }
        .text-rojo {
            color: #c62828;
        }
        .text-azul {
            color: #0D47A1;
        }

        .acciones {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Modal Detalle */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 800px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .modal-header h2 {
            color: #0D47A1;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #333;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .info-grid .item {
            display: flex;
            flex-direction: column;
        }

        .info-grid .item .label {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-grid .item .value {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }

        .detalle-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detalle-item:last-child {
            border-bottom: none;
        }

        .detalle-item .concepto {
            display: flex;
            flex-direction: column;
        }

        .detalle-item .concepto .nombre {
            font-weight: 500;
        }

        .detalle-item .concepto .diente {
            font-size: 12px;
            color: #666;
        }

        .detalle-item .monto {
            font-weight: 600;
        }

        .total-recibo {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-top: 2px solid #ddd;
            margin-top: 10px;
            font-size: 18px;
            font-weight: 700;
        }

        .total-recibo .total-label {
            color: #0D47A1;
        }

        .total-recibo .total-monto {
            color: #0D47A1;
        }

        .pagos-historial {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .pagos-historial h4 {
            color: #0D47A1;
            margin-bottom: 10px;
        }

        .pago-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        .pago-item:last-child {
            border-bottom: none;
        }

        .pago-item .pago-monto {
            color: #2e7d32;
            font-weight: 600;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #2196F3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-style: italic;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .filters-section {
                flex-direction: column;
            }
            .filter-group {
                min-width: 100%;
            }
            .resumen {
                grid-template-columns: 1fr 1fr;
            }
            .recibos-table {
                font-size: 12px;
            }
            .recibos-table th,
            .recibos-table td {
                padding: 8px 10px;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .resumen {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>
                    <i class="fas fa-file-invoice"></i>
                    Recibos - Clínica Odontológica
                </h1>
                <p class="subtitle"><i class="fas fa-info-circle"></i> Visualice todos los recibos con sus detalles completos</p>
            </div>
            <div>
                <button class="btn btn-success" onclick="cargarRecibos()">
                    <i class="fas fa-sync-alt"></i> Recargar
                </button>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filters-section">
            <div class="filter-group">
                <label for="estadoFiltro"><i class="fas fa-filter"></i> Estado</label>
                <select id="estadoFiltro">
                    <option value="todos">Todos</option>
                    <option value="PENDIENTE">Pendientes</option>
                    <option value="PARCIAL">Parciales</option>
                    <option value="PAGADO">Pagados</option>
                    <option value="CANCELADO">Cancelados</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="fechaInicio"><i class="fas fa-calendar-alt"></i> Desde</label>
                <input type="date" id="fechaInicio">
            </div>
            <div class="filter-group">
                <label for="fechaFin"><i class="fas fa-calendar-alt"></i> Hasta</label>
                <input type="date" id="fechaFin">
            </div>
            <div class="filter-group" style="flex: 0 0 auto; min-width: auto;">
                <button class="btn btn-primary" id="btnBuscar" style="height: 42px;">
                    <i class="fas fa-search"></i> Filtrar
                </button>
            </div>
            <div class="filter-group" style="flex: 0 0 auto; min-width: auto;">
                <button class="btn btn-secondary" id="btnLimpiar" style="height: 42px;">
                    <i class="fas fa-undo"></i> Limpiar
                </button>
            </div>
        </div>

        <!-- Resumen -->
        <div id="resumenContainer" class="resumen">
            <div class="resumen-item">
                <div class="numero total" id="totalRecibos">0</div>
                <div class="label">Total Recibos</div>
            </div>
            <div class="resumen-item">
                <div class="numero pendiente" id="totalPendientes">0</div>
                <div class="label">Pendientes</div>
            </div>
            <div class="resumen-item">
                <div class="numero" id="totalParciales" style="color: #0D47A1;">0</div>
                <div class="label">Parciales</div>
            </div>
            <div class="resumen-item">
                <div class="numero pagado" id="totalPagados">0</div>
                <div class="label">Pagados</div>
            </div>
            <div class="resumen-item">
                <div class="numero total" id="totalMonto" style="color: #0D47A1;">$0.00</div>
                <div class="label">Monto Total</div>
            </div>
        </div>

        <!-- Tabla -->
        <div class="table-container">
            <table class="recibos-table">
                <thead>
                    <tr>
                        <th>#ID</th>
                        <th>Estudiante</th>
                        <th>Paciente</th>
                        <th>Tratamiento</th>
                        <th>Dientes</th>
                        <th style="text-align: right;">Total</th>
                        <th style="text-align: center;">Estado</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="recibosBody">
                    <tr>
                        <td colspan="8" class="loading">
                            <div class="loading-spinner"></div>
                            <p style="margin-top: 10px;">Cargando recibos...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Detalle -->
    <div class="modal-overlay" id="modalDetalle">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-file-invoice"></i> Detalle del Recibo</h2>
                <button class="modal-close" onclick="cerrarModal()">&times;</button>
            </div>
            <div id="detalleContenido">
                <div class="loading"><div class="loading-spinner"></div> Cargando detalle...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';

        // ============ ELEMENTOS ============
        const btnBuscar = document.getElementById('btnBuscar');
        const btnLimpiar = document.getElementById('btnLimpiar');
        const estadoFiltro = document.getElementById('estadoFiltro');
        const fechaInicio = document.getElementById('fechaInicio');
        const fechaFin = document.getElementById('fechaFin');
        const recibosBody = document.getElementById('recibosBody');

        // ============ FUNCIONES ============

        function getEstadoBadge(estado) {
            const clases = {
                'PENDIENTE': 'estado-pendiente',
                'PARCIAL': 'estado-parcial',
                'PAGADO': 'estado-pagado'
            };
            const labels = {
                'PENDIENTE': 'PENDIENTE',
                'PARCIAL': 'PARCIAL',
                'PAGADO': 'PAGADO'
            };
            return `<span class="estado-badge ${clases[estado] || 'estado-pendiente'}">${labels[estado] || estado}</span>`;
        }

        function formatearMoneda(monto) {
            return monto ? `$${monto.toFixed(2)}` : '$0.00';
        }

        function formatearFecha(fecha) {
            if (!fecha) return '-';
            return new Date(fecha).toLocaleString('es-ES', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // ============ CARGAR RECIBOS ============
        async function cargarRecibos() {
            const estado = estadoFiltro.value;
            const desde = fechaInicio.value;
            const hasta = fechaFin.value;

            recibosBody.innerHTML = `
                <tr>
                    <td colspan="8" class="loading">
                        <div class="loading-spinner"></div>
                        <p>Cargando todos los recibos...</p>
                    </td>
                </tr>
            `;

            try {
                let response = await fetch(`${API_BASE}/api/recibos/todos`);
                if (!response.ok) {
                    response = await fetch(`${API_BASE}/api/recibos`);
                    if (!response.ok) throw new Error('Error al cargar recibos');
                }

                let recibos = await response.json();

                // Aplicar filtros
                if (estado !== 'todos') {
                    recibos = recibos.filter(r => r.estadoPago === estado);
                }
                if (desde) {
                    const fechaDesde = new Date(desde);
                    fechaDesde.setHours(0, 0, 0);
                    recibos = recibos.filter(r => r.fechaPago && new Date(r.fechaPago) >= fechaDesde);
                }
                if (hasta) {
                    const fechaHasta = new Date(hasta);
                    fechaHasta.setHours(23, 59, 59);
                    recibos = recibos.filter(r => r.fechaPago && new Date(r.fechaPago) <= fechaHasta);
                }

                if (!recibos || recibos.length === 0) {
                    recibosBody.innerHTML = `
                        <tr><td colspan="8" class="no-data">
                            <i class="fas fa-inbox" style="font-size: 30px; display: block; margin-bottom: 10px; opacity: 0.3;"></i>
                            No hay recibos registrados
                        </td></tr>
                    `;
                    actualizarResumen([]);
                    return;
                }

                actualizarResumen(recibos);

                let html = '';
                for (const recibo of recibos) {
                    const estado = recibo.estadoPago || 'PENDIENTE';
                    const montoTotal = recibo.montoTotal || 0;

                    // Obtener datos del estudiante y tratamiento desde los detalles
                    let estudianteNombre = 'N/A';
                    let tratamientoNombre = 'N/A';
                    let dientes = [];

                    if (recibo.detalles && recibo.detalles.length > 0) {
                        // Buscar estudiante desde el primer detalle
                        if (recibo.detalles[0].estudianteNombre) {
                            estudianteNombre = recibo.detalles[0].estudianteNombre;
                        }
                        
                        // Obtener nombres de tratamientos y dientes
                        const tratamientosSet = new Set();
                        const dientesSet = new Set();
                        
                        recibo.detalles.forEach(d => {
                            if (d.concepto) {
                                // Extraer nombre del tratamiento del concepto
                                const match = d.concepto.match(/Tratamiento:\s*([^-]+)/);
                                if (match) tratamientosSet.add(match[1].trim());
                                
                                // Extraer diente del concepto
                                const dienteMatch = d.concepto.match(/Diente\s*(\d+)/);
                                if (dienteMatch) dientesSet.add(dienteMatch[1]);
                            }
                        });
                        
                        tratamientoNombre = Array.from(tratamientosSet).join(', ') || 'N/A';
                        dientes = Array.from(dientesSet).sort((a, b) => a - b);
                    }

                    html += `
                        <tr>
                            <td><strong>#${recibo.idRecibo}</strong></td>
                            <td>${estudianteNombre}</td>
                            <td>${recibo.pacienteNombre || 'N/A'}</td>
                            <td>${tratamientoNombre}</td>
                            <td>${dientes.length > 0 ? dientes.join(', ') : '-'}</td>
                            <td style="text-align: right; font-weight: 600;">${formatearMoneda(montoTotal)}</td>
                            <td style="text-align: center;">${getEstadoBadge(estado)}</td>
                            <td style="text-align: center;">
                                <button class="btn btn-primary btn-sm" onclick="verDetalle(${recibo.idRecibo})">
                                    <i class="fas fa-eye"></i> Ver
                                </button>
                                ${estado === 'PENDIENTE' || estado === 'PARCIAL' ? `
                                    <button class="btn btn-success btn-sm" onclick="pagarRecibo(${recibo.idRecibo}, ${recibo.saldoPendiente || 0})">
                                        <i class="fas fa-money-bill-wave"></i>
                                    </button>
                                ` : ''}
                            </td>
                        </tr>
                    `;
                }

                recibosBody.innerHTML = html;

            } catch (error) {
                console.error('Error:', error);
                recibosBody.innerHTML = `
                    <tr><td colspan="8" style="padding: 20px; text-align: center; color: #c62828;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 24px; display: block; margin-bottom: 10px;"></i>
                        Error: ${error.message}
                        <br><button class="btn btn-primary" onclick="cargarRecibos()" style="margin-top: 10px;">Reintentar</button>
                    </td></tr>
                `;
            }
        }

        function actualizarResumen(recibos) {
            let total = recibos.length;
            let pendientes = 0, parciales = 0, pagados = 0;
            let montoTotal = 0;

            recibos.forEach(r => {
                const estado = r.estadoPago || 'PENDIENTE';
                if (estado === 'PENDIENTE') pendientes++;
                else if (estado === 'PARCIAL') parciales++;
                else if (estado === 'PAGADO') pagados++;
                montoTotal += r.montoTotal || 0;
            });

            document.getElementById('totalRecibos').textContent = total;
            document.getElementById('totalPendientes').textContent = pendientes;
            document.getElementById('totalParciales').textContent = parciales;
            document.getElementById('totalPagados').textContent = pagados;
            document.getElementById('totalMonto').textContent = formatearMoneda(montoTotal);
        }

        // ============ VER DETALLE ============
        async function verDetalle(idRecibo) {
            const modal = document.getElementById('modalDetalle');
            const contenido = document.getElementById('detalleContenido');
            modal.classList.add('active');
            contenido.innerHTML = '<div class="loading"><div class="loading-spinner"></div> Cargando detalle...</div>';

            try {
                const response = await fetch(`${API_BASE}/api/recibos/${idRecibo}/completo`);
                if (!response.ok) throw new Error('Error al obtener detalle');

                const data = await response.json();

                let detallesHtml = '';
                let estudianteNombre = 'N/A';
                let pacienteNombre = 'N/A';
                let totalTratamientos = 0;
                let totalRadiografias = 0;

                if (data.detalles && data.detalles.length > 0) {
                    data.detalles.forEach(d => {
                        // Intentar obtener estudiante del detalle
                        if (d.estudianteNombre) estudianteNombre = d.estudianteNombre;
                        
                        const esRadiografia = d.tipoItem === 'RADIOGRAFIA';
                        if (esRadiografia) {
                            totalRadiografias += d.subtotal || 0;
                        } else {
                            totalTratamientos += d.subtotal || 0;
                        }
                        
                        // Extraer diente del concepto
                        let dienteHtml = '';
                        const dienteMatch = d.concepto ? d.concepto.match(/Diente\s*(\d+)/) : null;
                        if (dienteMatch) {
                            dienteHtml = `<span class="diente">🦷 Diente ${dienteMatch[1]}</span>`;
                        }
                        
                        detallesHtml += `
                            <div class="detalle-item">
                                <div class="concepto">
                                    <span class="nombre">${d.concepto || 'Sin concepto'}</span>
                                    ${dienteHtml}
                                    ${esRadiografia ? '<span style="font-size: 11px; color: #666;">📷 Radiografía</span>' : ''}
                                </div>
                                <span class="monto">${formatearMoneda(d.subtotal)}</span>
                            </div>
                        `;
                    });
                }

                // Obtener paciente
                if (data.pacienteNombre) pacienteNombre = data.pacienteNombre;

                contenido.innerHTML = `
                    <div class="info-grid">
                        <div class="item">
                            <span class="label">Recibo #</span>
                            <span class="value">${data.idRecibo}</span>
                        </div>
                        <div class="item">
                            <span class="label">Estado</span>
                            <span class="value">${getEstadoBadge(data.estadoPago)}</span>
                        </div>
                        <div class="item">
                            <span class="label">Fecha</span>
                            <span class="value">${formatearFecha(data.fechaPago)}</span>
                        </div>
                        <div class="item">
                            <span class="label">Estudiante</span>
                            <span class="value">${estudianteNombre}</span>
                        </div>
                        <div class="item">
                            <span class="label">Paciente</span>
                            <span class="value">${pacienteNombre}</span>
                        </div>
                        <div class="item">
                            <span class="label">Monto Total</span>
                            <span class="value" style="color: #0D47A1;">${formatearMoneda(data.montoTotal)}</span>
                        </div>
                    </div>

                    <h4 style="margin: 15px 0 10px; color: #0D47A1;"><i class="fas fa-list"></i> Detalle de Servicios</h4>
                    ${detallesHtml || '<p style="color: #999;">No hay detalles</p>'}

                    <div class="total-recibo">
                        <span class="total-label">TOTAL</span>
                        <span class="total-monto">${formatearMoneda(data.montoTotal)}</span>
                    </div>

                    <div style="display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; border-top: 1px solid #eee; margin-top: 5px;">
                        <span>Subtotal Tratamientos</span>
                        <span style="font-weight: 600;">${formatearMoneda(totalTratamientos)}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px;">
                        <span>Subtotal Radiografías</span>
                        <span style="font-weight: 600;">${formatearMoneda(totalRadiografias)}</span>
                    </div>

                    <div class="pagos-historial">
                        <h4><i class="fas fa-money-bill-wave"></i> Historial de Pagos</h4>
                        ${data.pagos && data.pagos.length > 0 ? 
                            data.pagos.map(p => `
                                <div class="pago-item">
                                    <span>${formatearFecha(p.fechaPago)} - ${p.metodoPago || 'N/A'} ${p.observaciones ? `(${p.observaciones})` : ''}</span>
                                    <span class="pago-monto">${formatearMoneda(p.monto)}</span>
                                </div>
                            `).join('') : 
                            '<p style="color: #999;">No hay pagos registrados</p>'
                        }
                        <div style="display: flex; justify-content: space-between; padding: 10px 0; border-top: 2px solid #ddd; margin-top: 10px; font-weight: 600;">
                            <span>Total Pagado</span>
                            <span style="color: #2e7d32;">${formatearMoneda(data.montoPagado)}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; padding: 5px 0; font-weight: 600; font-size: 16px;">
                            <span>Saldo Pendiente</span>
                            <span style="color: ${data.saldoPendiente > 0 ? '#c62828' : '#2e7d32'};">${formatearMoneda(data.saldoPendiente)}</span>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Error:', error);
                contenido.innerHTML = `
                    <div style="text-align: center; padding: 30px; color: #c62828;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 40px; display: block; margin-bottom: 15px;"></i>
                        Error al cargar detalle: ${error.message}
                    </div>
                `;
            }
        }

        function cerrarModal() {
            document.getElementById('modalDetalle').classList.remove('active');
        }

        // ============ PAGAR RECIBO ============
        async function pagarRecibo(idRecibo, saldo) {
            const { value: monto } = await Swal.fire({
                title: 'Registrar Pago',
                html: `
                    <p>Recibo #${idRecibo}</p>
                    <p><strong>Saldo pendiente: $${saldo.toFixed(2)}</strong></p>
                    <div style="margin-top: 15px;">
                        <label style="display: block; text-align: left; font-weight: 600; margin-bottom: 5px;">Monto a pagar</label>
                        <input id="swal-monto" type="number" step="0.01" min="0.01" max="${saldo}" value="${saldo}" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px;">
                    </div>
                    <div style="margin-top: 10px;">
                        <label style="display: block; text-align: left; font-weight: 600; margin-bottom: 5px;">Método de pago</label>
                        <select id="swal-metodo" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px;">
                            <option value="EFECTIVO">Efectivo</option>
                            <option value="TARJETA">Tarjeta</option>
                            <option value="TRANSFERENCIA">Transferencia</option>
                            <option value="OTRO">Otro</option>
                        </select>
                    </div>
                `,
                confirmButtonText: '✅ Confirmar Pago',
                cancelButtonText: 'Cancelar',
                showCancelButton: true,
                confirmButtonColor: '#4CAF50',
                cancelButtonColor: '#999',
                preConfirm: () => {
                    const monto = parseFloat(document.getElementById('swal-monto').value);
                    const metodo = document.getElementById('swal-metodo').value;
                    if (!monto || monto <= 0) {
                        Swal.showValidationMessage('Ingrese un monto válido');
                        return false;
                    }
                    if (monto > saldo) {
                        Swal.showValidationMessage(`El monto no puede exceder el saldo ($${saldo.toFixed(2)})`);
                        return false;
                    }
                    return { monto, metodo };
                }
            });

            if (!monto) return;

            try {
                const response = await fetch(`${API_BASE}/api/recibos/${idRecibo}/pagar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        monto: monto.monto,
                        metodoPago: monto.metodo,
                        observaciones: 'Pago registrado desde la web'
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Error al registrar pago');
                }

                const data = await response.json();

                await Swal.fire({
                    icon: 'success',
                    title: '✅ Pago registrado',
                    html: `
                        <p>Se registró un pago de <strong>$${monto.monto.toFixed(2)}</strong></p>
                        <p>Saldo pendiente: <strong>$${data.saldoPendiente.toFixed(2)}</strong></p>
                        <p>Estado: <strong>${data.estadoPago}</strong></p>
                    `,
                    confirmButtonColor: '#4CAF50'
                });

                cargarRecibos();

            } catch (error) {
                console.error('Error:', error);
                await Swal.fire({
                    icon: 'error',
                    title: '❌ Error',
                    text: error.message,
                    confirmButtonColor: '#c62828'
                });
            }
        }

        // ============ EVENTOS ============
        btnBuscar.addEventListener('click', cargarRecibos);
        btnLimpiar.addEventListener('click', () => {
            estadoFiltro.value = 'todos';
            fechaInicio.value = '';
            fechaFin.value = '';
            cargarRecibos();
        });

        estadoFiltro.addEventListener('change', cargarRecibos);
        fechaInicio.addEventListener('change', cargarRecibos);
        fechaFin.addEventListener('change', cargarRecibos);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cerrarModal();
        });

        document.getElementById('modalDetalle').addEventListener('click', function(e) {
            if (e.target === this) cerrarModal();
        });

        // ============ INICIALIZAR ============
        window.addEventListener('load', () => {
            const hoy = new Date();
            const hace30Dias = new Date();
            hace30Dias.setDate(hoy.getDate() - 30);
            fechaInicio.value = hace30Dias.toISOString().split('T')[0];
            fechaFin.value = hoy.toISOString().split('T')[0];
            cargarRecibos();
        });
    </script>
</body>
</html>
