<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubic Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/CSS/panel.css}">
</head>
<body>          
    <!-- Sidebar -->    
    <div class="sidebar" id="sidebar">
        <div class="logo">
            <div>
                <h1>PANEL</h1>
                <h1>INSUMOS</h1>
            </div>
            <button class="toggle-btn" id="toggleBtn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        
        <ul class="menu">
            <li onclick="loadPage('/encargado_insumo/solicitud-estudiante/soli_estudiante-vista', 'Solicitud Estudiante', 'SoliEstudianteFrame', this)">
                <i class="fas fa-user-graduate"></i>
                <span class="menu-text">Solicitud Estudiante</span>
            </li>

            <li onclick="loadPage('/encargado_insumo/solicitud-insumo/pedido-vista', 'Solicitud de Insumos', 'solicitudPedidoFrame', this)">
                <i class="fas fa-boxes"></i>
                <span class="menu-text">Solicitud de Insumos</span>
            </li>

            <li onclick="loadPage('/encargado_insumo/solicitud-abastecimiento/abastecimiento-vista', 'Solicitud Abastecimiento', 'abastecimientoFrame', this)">
                <i class="fas fa-truck"></i>
                <span class="menu-text">Solicitud Abastecimiento</span>
            </li>
            <li onclick="loadPage('/encargado_insumo/consumido_insumo/consumido-vista', 'Total de insumos consumidos por clinica', 'consumidoFrame', this)">
                <i class="fas fa-truck"></i>
                <span class="menu-text">Insumos Consumidos</span>
            </li>
            <li onclick="loadPage('/encargado_insumo/registro_equi_ins/equi_insu-vista', 'Equipos y Insumos', 'equipoInsumoFrame', this)">
                <i class="fas fa-truck"></i>
                <span class="menu-text">Insumos</span>
            </li>
        </ul>
        
        <div class="user-info">
            <div class="user-avatar">HG</div>
            <div class="user-details">
                <div class="user-name" id="nombreUsuario">Hanna Gover</div>
            </div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h2 id="pageTitle">Solicitud Estudiante</h2>
            <div class="user-menu">
                <i class="fas fa-bell"></i>
                <i class="fas fa-cog"></i>
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
        
        <!-- Contenido de Solicitud Estudiante -->
        <div id="SoliEstudianteContent" class="content-area active">
            <iframe id="SoliEstudianteFrame" src="about:blank"></iframe>
        </div>
        
        <!-- Contenido de Solicitud de Insumos -->
        <div id="solicitudPedidoContent" class="content-area">
            <iframe id="solicitudPedidoFrame" src="about:blank"></iframe>
        </div>
        
        <!-- Contenido de Solicitud Abastecimiento -->
        <div id="abastecimientoContent" class="content-area">
            <iframe id="abastecimientoFrame" src="about:blank"></iframe>
        </div>

        <div id="consumidoContent" class="content-area">
            <iframe id="consumidoFrame" src="about:blank"></iframe>
        </div>
        
        <div id="equipoInsumoContent" class="content-area">
            <iframe id="equipoInsumoFrame" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        // ✅ Guardar el usuario en una variable global
        window.usuarioGlobal = document.getElementById('nombreUsuario').textContent;
        console.log('👤 Usuario global:', window.usuarioGlobal);

        // Toggle sidebar
        const toggleBtn = document.getElementById('toggleBtn');
        const sidebar = document.getElementById('sidebar');
        
        toggleBtn.addEventListener('click', function() {
            sidebar.classList.toggle('collapsed');
        });

        function loadPage(pageUrl, pageTitle, frameId, menuItem) {
            // Ocultar todo el contenido
            document.querySelectorAll('.content-area').forEach(content => {
                content.classList.remove('active');
            });
            
            // Remover clase active de todos los items del menú
            document.querySelectorAll('.menu li').forEach(item => {
                item.classList.remove('active');
            });
            
            // Mostrar el contenido correspondiente según el frameId
            if (frameId === 'abastecimientoFrame') {
                document.getElementById('abastecimientoContent').classList.add('active');
            } else if (frameId === 'solicitudPedidoFrame') {
                document.getElementById('solicitudPedidoContent').classList.add('active');
            } else if (frameId === 'SoliEstudianteFrame') {
                document.getElementById('SoliEstudianteContent').classList.add('active');
            } else if (frameId === 'consumidoFrame') {
                document.getElementById('consumidoContent').classList.add('active');
            } else if (frameId === 'equipoInsumoFrame') {
                document.getElementById('equipoInsumoContent').classList.add('active');
            }
            
            // Activar el item del menú clickeado
            if (menuItem && menuItem.classList) {
                menuItem.classList.add('active');
            }
            
            // Actualizar el título de la página
            document.getElementById('pageTitle').textContent = pageTitle;
            
            // ✅ Cargar la página en el iframe con el usuario como parámetro
            const frame = document.getElementById(frameId);
            if (frame) {
                // Agregar el usuario como parámetro en la URL
                const urlConUsuario = pageUrl + '?usuario=' + encodeURIComponent(window.usuarioGlobal);
                frame.src = urlConUsuario;
                console.log('📄 Cargando:', urlConUsuario);
            }
        }

        // Cargar la primera página por defecto al iniciar
        window.onload = function() {
            // Cargar la primera opción del menú
            const firstMenuItem = document.querySelector('.menu li');
            if (firstMenuItem) {
                firstMenuItem.click();
            }
        };
    </script>
</body>
</html>
