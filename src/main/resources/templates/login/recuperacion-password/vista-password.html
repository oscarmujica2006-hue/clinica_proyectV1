<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Clínica Odontológica UAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/CSS/login_dise.css}">
</head>

<body>
    <div class="login-content">
        <div class="logo">
            <h1>Restablecer Contraseña</h1>
            <p>Ingresa tu nueva contraseña</p>
        </div>
        
        <form class="formulario" id="formResetPassword">
            <div class="input-group">
                <label for="nuevaPassword">Nueva Contraseña</label>
                <input type="password" id="nuevaPassword" placeholder="Ingresa tu nueva contraseña" required minlength="6">
            </div>
            
            <div class="input-group">
                <label for="confirmarPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmarPassword" placeholder="Confirma tu nueva contraseña" required>
            </div>
            
            <button type="submit" class="signin-btn">RESTABLECER CONTRASEÑA</button>
            
            <div class="password-olvidada" style="text-align: center; margin-top: 20px;">
                <a href="/">← Volver al inicio de sesión</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // Obtener token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            Swal.fire({
                title: '❌ Error',
                text: 'Token no válido o expirado',
                icon: 'error',
                confirmButtonText: 'Aceptar'
            }).then(() => {
                window.location.href = '/';
            });
        }
        
        document.getElementById('formResetPassword').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nuevaPassword = document.getElementById('nuevaPassword').value;
            const confirmarPassword = document.getElementById('confirmarPassword').value;
            
            // Validar que las contraseñas coincidan
            if (nuevaPassword !== confirmarPassword) {
                Swal.fire({
                    title: '❌ Error',
                    text: 'Las contraseñas no coinciden',
                    icon: 'error',
                    confirmButtonText: 'Intentar de nuevo'
                });
                return;
            }
            
            // Validar longitud mínima
            if (nuevaPassword.length < 6) {
                Swal.fire({
                    title: '❌ Error',
                    text: 'La contraseña debe tener al menos 6 caracteres',
                    icon: 'error',
                    confirmButtonText: 'Intentar de nuevo'
                });
                return;
            }
            
            // Mostrar loading
            Swal.fire({
                title: 'Restableciendo...',
                text: 'Por favor espera',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
            
            fetch(`/api/recuperacion-password/restablecer/${token}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ nuevaPassword: nuevaPassword })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire({
                        title: '✅ Contraseña Restablecida',
                        text: data.mensaje || 'Tu contraseña ha sido actualizada correctamente',
                        icon: 'success',
                        confirmButtonText: 'Ir al inicio de sesión',
                        confirmButtonColor: '#3b82f6'
                    }).then(() => {
                        window.location.href = '/';
                    });
                } else {
                    Swal.fire({
                        title: '❌ Error',
                        text: data.mensaje || 'No se pudo restablecer la contraseña',
                        icon: 'error',
                        confirmButtonText: 'Aceptar'
                    }).then(() => {
                        window.location.href = '/';
                    });
                }
            })
            .catch(error => {
                console.error('Error:', error);
                Swal.fire({
                    title: '❌ Error',
                    text: 'Error en el servidor. Intenta más tarde.',
                    icon: 'error',
                    confirmButtonText: 'Aceptar'
                });
            });
        });
    </script>
</body>

</html>
